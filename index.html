        margin-bottom: 30px;

        gap: 12px;
        margin-bottom: 24px;
        overflow-x: auto;

        flex-wrap: nowrap;
        padding-bottom: 8px;

        }
    }

    .day-btn-wrapper {

    }

    .section-badge {

        font-weight: 600;
        border-radius: 12px;
        padding: 2px 8px;
        margin-left: 10px;
        vertical-align: middle;

        border-radius: 12px;
        border: 1px solid var(--border-color);
        background-color: var(--card-bg);
        color: var(--text-color);
        font-size: 1.1em;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .day-btn.active {
        background-color: var(--accent);
        color: #fff;
        border-color: var(--accent);
    }

    /* Filters */
    .filters-section {
        display: flex;
        gap: 16px;
        margin-bottom: 30px;
    }

    .filters-section select {
        flex: 1;
        min-width: 0;
        padding: 12px 16px;
        border-radius: 12px;
        border: 1px solid var(--border-color);
        background-color: transparent;
        color: var(--text-color);
        font-size: 1em;
        font-family: var(--font-stack);
        appearance: none;
        outline: none;
        cursor: pointer;
    }

    /* Collapsible Sections */
    .section-title {
        font-size: 1.3em;
        font-weight: 600;
        margin: 10px 0 10px 0;
        padding-bottom: 8px;
        border-bottom: 2px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        user-select: none;
        transition: opacity 0.2s ease;
    }
    
    .section-title:hover {
        opacity: 0.7;
    }

    .chevron {
        width: 20px;
        height: 20px;
        transition: transform 0.3s ease;
    }

    .collapsed .chevron {
        transform: rotate(-90deg);
    }
    
    .collapsed-content {
        display: none !important;
    }

    /* List View */
    .list-view {
        display: flex;
        flex-direction: column;
        margin-bottom: 30px;
    }

    .list-item {
        display: flex;
        align-items: center;
        padding: 16px 0;
        border-bottom: 1px solid var(--border-color);
        gap: 20px;
        text-decoration: none;
        color: inherit;
        cursor: pointer;
        transition: background-color 0.2s ease, opacity 0.2s ease;
    }

    .list-item:hover {
        opacity: 0.7;
    }

    .list-item:last-child {
        border-bottom: none;
    }

    }

    .line-3 {

        color: var(--secondary-text);

    .badge {

    }
    
    .no-results {

        padding: 30px;
        color: var(--secondary-text);
        font-size: 1.1em;
    }
</style>

    const today = new Date();
    document.getElementById('current-date').textContent = today.toLocaleDateString('en-US', dateOptions);
    
    const todayName = today.toLocaleDateString('en-US', { weekday: 'long' });

    // Setup Day Buttons
    const days = [
        { full: 'All', label: 'All' },
        { full: 'Monday', label: 'M' },
        { full: 'Tuesday', label: 'T' },
        { full: 'Wednesday', label: 'W' },
        { full: 'Thursday', label: 'T' },
        { full: 'Friday', label: 'F' },
        { full: 'Saturday', label: 'S' },
        { full: 'Sunday', label: 'S' }
    ];
    
    // Setup Day Buttons
    const buttons = document.querySelectorAll('.day-btn');
    buttons.forEach(btn => {
        if (btn.getAttribute('data-day') === currentDay) {
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // Auto scroll to active button on mobile
            setTimeout(() => {
                btn.parentElement.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }, 100);
        }
        
        btn.onclick = () => {
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentDay = btn.getAttribute('data-day');
            
            renderLists();
        };
    });

    // Listeners for filters
    const studioSelect = document.getElementById('studio-filter');
    const levelSelect = document.getElementById('level-filter');
    studioSelect.addEventListener('change', (e) => { currentStudio = e.target.value; renderLists(); });
    levelSelect.addEventListener('change', (e) => { currentLevel = e.target.value; renderLists(); });

    function toggleSection(sectionName) {
        const listId = sectionName === 'today' ? 'today-class-list' : 'class-list';
        const titleContainerId = sectionName === 'today' ? 'today-title-container' : 'filtered-title-container';
        
        const list = document.getElementById(listId);
        const titleContainer = document.getElementById(titleContainerId);
        
        if (list.classList.contains('collapsed-content')) {
            list.classList.remove('collapsed-content');
            titleContainer.classList.remove('collapsed');
        } else {
            list.classList.add('collapsed-content');
            titleContainer.classList.add('collapsed');
        }
    }

    function getStudioClass(studioName) {
        return 'studio-' + studioName.replace(/\s+/g, '');
    }

    // Generate list HTML
    function generateHTML(classes) {
        if (classes.length === 0) {
            return '<div class="no-results">No classes found matching your criteria.</div>';
        }

        return classes.map(c => {
            const badgeHTML = c.Notes ? `<div class="line-3"><span class="badge">${c.Notes}</span></div>` : '';
            const signupLink = bookingLinks[c.Studio] || '#';
            return `
                <a href="${signupLink}" target="_blank" class="list-item">
                    <div class="col-studio ${getStudioClass(c.Studio)}">${c.Studio}</div>
                    <div class="col-info">
                        <div class="line-1">${c.Day}, ${c.Time}</div>
                        <div class="line-2">
                            ${c['Class / Level']} <span class="instructor-text"> by ${c.Instructor}</span>
                        </div>
                        ${badgeHTML}
                    </div>
                    <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </a>
            `;
        }).join('');
    }

    function renderLists() {
        const todaySection = document.getElementById('today-section');
        const filteredSection = document.getElementById('filtered-section');
        const todayContainer = document.getElementById('today-class-list');
        const listContainer = document.getElementById('class-list');
        const filteredHeading = document.getElementById('filtered-heading');
        const todayCount = document.getElementById('today-count');
        const filteredCount = document.getElementById('filtered-count');

        // 1. Today's Classes
        const todayClasses = classData.filter(c => {
            return c.Day === todayName &&
                   (currentStudio === 'All' || c.Studio === currentStudio) &&

                   (currentLevel === 'All' || c['Class / Level'] === currentLevel);
        });

        // 2. Filtered Classes
        const filteredClasses = classData.filter(c => {
            return (currentDay === 'All' || c.Day === currentDay) &&
                   (currentStudio === 'All' || c.Studio === currentStudio) &&
                   (currentLevel === 'All' || c['Class / Level'] === currentLevel);
        });

        todayContainer.innerHTML = generateHTML(todayClasses);
        listContainer.innerHTML = generateHTML(filteredClasses);

        // Layout Logic
        if (currentDay === todayName) {
            // If user explicitly picked today, hide the redundant filtered list
            todaySection.style.display = todayClasses.length > 0 ? 'block' : 'none';
            filteredSection.style.display = 'none';
            document.getElementById('today-heading').innerHTML = 'Today\'s Classes <span class="section-badge">' + todayClasses.length + '</span>';
        } else if (currentDay === 'All') {
            // Show both
            todaySection.style.display = todayClasses.length > 0 ? 'block' : 'none';
            filteredSection.style.display = 'block';
            document.getElementById('today-heading').innerHTML = 'Today\'s Classes <span class="section-badge">' + todayClasses.length + '</span>';
            document.getElementById('filtered-heading').innerHTML = 'All Classes <span class="section-badge">' + filteredClasses.length + '</span>';
        } else {
            // Show selected day
            todaySection.style.display = 'none';
            filteredSection.style.display = 'block';
            document.getElementById('filtered-heading').innerHTML = currentDay + '\'s Classes <span class="section-badge">' + filteredClasses.length + '</span>';
        }
    }

    // Initial render
    renderLists();
</script>

</body>
</html>
