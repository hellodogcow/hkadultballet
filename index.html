<html lang="en">

<style>

        --text-color: #1d1d1f;
        --border-color: #e5e5ea;
        --accent: #0071e3;
        --secondary-text: #86868b;
        --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        
        /* Studio Colors */
        --color-atelier: #34c759;
        --color-aballet: #ff9500;
        --color-lumiere: #007aff;
        --color-hkb: #af52de;
    }

    @media (prefers-color-scheme: dark) {
        :root {
            --bg-color: #000000;
            --text-color: #f5f5f7;
            --border-color: #38383a;
            --accent: #2997ff;
            --secondary-text: #98989d;
        }
    }

    body {
        font-family: var(--font-stack);
        background-color: var(--bg-color);
        color: var(--text-color);
        margin: 0;
        padding: 0;
        -webkit-font-smoothing: antialiased;
    }

    .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 30px 20px;
    }

    .header-section {
        text-align: center;
        margin-bottom: 30px;
    }

    h1 {
        font-weight: 700;
        margin: 0 0 8px 0;
        font-size: 2.2em;
        letter-spacing: -0.02em;
    }

    #current-date {
        color: var(--secondary-text);
        font-size: 1.1em;
        font-weight: 500;
    }

    /* Day Picker */
    .day-picker {
        display: flex;
        justify-content: flex-start;
        gap: 12px;
        margin-bottom: 24px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        flex-wrap: nowrap;
        padding-bottom: 8px;
    }
    
    @media (min-width: 500px) {
        .day-picker {
            justify-content: center;
        }
    }

    .day-btn {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        border: 1px solid var(--border-color);
        background-color: transparent;
        color: var(--text-color);
        font-size: 1.1em;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .day-btn.active {
        background-color: var(--accent);
        color: #fff;
        border-color: var(--accent);
    }

    /* Filters */
    .filters-section {
        display: flex;
        gap: 16px;
        margin-bottom: 30px;
    }

    .filters-section select {
        flex: 1;
        min-width: 0;
        padding: 12px 16px;
        border-radius: 12px;
        border: 1px solid var(--border-color);
        background-color: transparent;
        color: var(--text-color);
        font-size: 1em;
        font-family: var(--font-stack);
        appearance: none;
        outline: none;
        cursor: pointer;
    }

    /* Collapsible Sections */
    .section-title {
        font-size: 1.3em;
        font-weight: 600;
        margin: 10px 0 10px 0;
        padding-bottom: 8px;
        border-bottom: 2px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
        user-select: none;
        transition: opacity 0.2s ease;
    }
    
    .section-title:hover {
        opacity: 0.7;
    }

    .chevron {
        width: 20px;
        height: 20px;
        transition: transform 0.3s ease;
    }

    .collapsed .chevron {
        transform: rotate(-90deg);
    }
    
    .collapsed-content {
        display: none !important;
    }

    /* List View */
    .list-view {
        display: flex;
        flex-direction: column;
        margin-bottom: 30px;
    }

    .list-item {
        display: flex;
        align-items: center;
        padding: 16px 0;
        border-bottom: 1px solid var(--border-color);
        gap: 20px;
        text-decoration: none;
        color: inherit;
        cursor: pointer;
        transition: background-color 0.2s ease, opacity 0.2s ease;
    }

    .list-item:hover {
        opacity: 0.7;
    }

    .list-item:last-child {
        border-bottom: none;
    }

    /* Column 1: Studio Box */
    .col-studio {
        flex: 0 0 85px;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 40px;
        border-radius: 8px;
        color: white;
        font-weight: 600;
        font-size: 0.85em;
        text-align: center;
        padding: 0 8px;
        box-sizing: border-box;
    }

    .studio-Atelier { background-color: var(--color-atelier); }
    .studio-A-Ballet { background-color: var(--color-aballet); }
    .studio-Lumière { background-color: var(--color-lumiere); }
    .studio-HKB { background-color: var(--color-hkb); }

    /* Column 2: Info */
    .col-info {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-width: 0;
    }

    .line-1 {
        color: var(--secondary-text);
        font-size: 0.9em;
        font-weight: 500;
    }

    .line-2 {
        font-size: 1.1em;
        font-weight: 600;
        color: var(--text-color);
        line-height: 1.4;
    }
    
    .instructor-text {
        font-weight: 400;
        color: var(--secondary-text);
    }

    .badge {
        display: inline-block;
        padding: 3px 8px;
        border-radius: 8px;
        font-size: 0.75em;
        background-color: rgba(0, 113, 227, 0.1);
        color: var(--accent);
        font-weight: 600;
        margin-left: 8px;
        vertical-align: middle;
    }

    .chevron-right {
        width: 20px;
        height: 20px;
        color: var(--secondary-text);
        margin-left: auto;
        opacity: 0.5;
    }
    
    .no-results {
        text-align: center;
        padding: 30px;
        color: var(--secondary-text);
        font-size: 1.1em;
    }
</style>
</head>

            return `
                <a href="${signupLink}" target="_blank" class="list-item">
                    <div class="col-studio ${getStudioClass(c.Studio)}">${c.Studio}</div>
                    <div class="col-info">
                        <div class="line-1">${c.Day}, ${c.Time}</div>
                        <div class="line-2">
                            ${c['Class / Level']} <span class="instructor-text"> by ${c.Instructor}</span>
                            ${badgeHTML}
                        </div>
                    </div>
                    <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </a>
            `;
        }).join('');
    }

    function renderLists() {
        const todaySection = document.getElementById('today-section');
        const filteredSection = document.getElementById('filtered-section');
        const todayContainer = document.getElementById('today-class-list');
        const listContainer = document.getElementById('class-list');
        const filteredHeading = document.getElementById('filtered-heading');

        // 1. Today's Classes
        const todayClasses = classData.filter(c => {
            return c.Day === todayName &&
                   (currentStudio === 'All' || c.Studio === currentStudio) &&
                   (currentLevel === 'All' || c['Class / Level'] === currentLevel);
        });

        // 2. Filtered Classes
        const filteredClasses = classData.filter(c => {
            return (currentDay === 'All' || c.Day === currentDay) &&
                   (currentStudio === 'All' || c.Studio === currentStudio) &&
                   (currentLevel === 'All' || c['Class / Level'] === currentLevel);
        });

        todayContainer.innerHTML = generateHTML(todayClasses);
        listContainer.innerHTML = generateHTML(filteredClasses);

        // Layout Logic
        if (currentDay === todayName) {
            // If user explicitly picked today, hide the redundant filtered list
            todaySection.style.display = 'block';
            filteredSection.style.display = 'none';
        } else if (currentDay === 'All') {
            // Show both
            todaySection.style.display = 'block';
            filteredSection.style.display = 'block';
            filteredHeading.textContent = 'All Classes';
        } else {
            // Show today + selected day
            todaySection.style.display = 'block';
            filteredSection.style.display = 'block';
            filteredHeading.textContent = currentDay + "'s Classes";
        }
    }

    // Initial render
    renderLists();
</script>

</body>
</html>
